kind = "web"
previewPath = "/"
title = "AI Coloring Book Generator"
version = "1.0.0"
id = "artifacts/coloring-book"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21375

[services.development]
run = "pnpm --filter @workspace/coloring-book run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coloring-book", "run", "build" ]
publicDir = "artifacts/coloring-book/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21375"
BASE_PATH = "/"
