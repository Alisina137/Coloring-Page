openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: coloring
  - name: profiles
  - name: stories
  - name: daily
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /coloring/generate:
    post:
      operationId: generateColoringPage
      tags: [coloring]
      summary: Generate a coloring page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateColoringPageBody"
      responses:
        "200":
          description: Generated coloring page image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedImage"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coloring/history:
    get:
      operationId: getColoringHistory
      tags: [coloring]
      summary: Get generation history
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: profileId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of generated images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeneratedImage"

  /coloring/history/{id}:
    delete:
      operationId: deleteColoringHistory
      tags: [coloring]
      summary: Delete a history item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coloring/stats:
    get:
      operationId: getColoringStats
      tags: [coloring]
      summary: Get coloring stats
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColoringStats"

  /coloring/color-guide/{id}:
    get:
      operationId: getColorGuide
      tags: [coloring]
      summary: Get step-by-step color guide for a page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Color guide steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColorGuideResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles:
    get:
      operationId: getProfiles
      tags: [profiles]
      summary: Get all child profiles
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChildProfile"
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create a child profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileBody"
      responses:
        "201":
          description: Created profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChildProfile"

  /profiles/{id}:
    patch:
      operationId: updateProfile
      tags: [profiles]
      summary: Update a child profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChildProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProfile
      tags: [profiles]
      summary: Delete a child profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/{id}/badges:
    get:
      operationId: getProfileBadges
      tags: [profiles]
      summary: Get badges for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of badge keys
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /stories/generate:
    post:
      operationId: generateStory
      tags: [stories]
      summary: Generate a multi-page story
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoryBody"
      responses:
        "200":
          description: Generated story with pages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stories:
    get:
      operationId: getStories
      tags: [stories]
      summary: Get all stories
      responses:
        "200":
          description: List of stories with pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryResponse"

  /daily/challenge:
    get:
      operationId: getDailyChallenge
      tags: [daily]
      summary: Get today's daily challenge
      responses:
        "200":
          description: Today's challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyChallengeResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GenerateColoringPageBody:
      type: object
      properties:
        gender:
          type: string
          enum: [Boy, Girl, Neutral]
        genre:
          type: string
        ageGroup:
          type: string
          enum: ["3-5", "6-8", "9+"]
        description:
          type: ["string", "null"]
        profileId:
          type: ["integer", "null"]
      required:
        - gender
        - genre
        - ageGroup

    GeneratedImage:
      type: object
      properties:
        id:
          type: integer
        gender:
          type: string
        genre:
          type: string
        ageGroup:
          type: string
        description:
          type: ["string", "null"]
        imageData:
          type: string
        coloredImageData:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - gender
        - genre
        - ageGroup
        - imageData
        - createdAt

    ColorGuideResponse:
      type: object
      properties:
        id:
          type: integer
        steps:
          type: array
          items:
            type: string
      required:
        - id
        - steps

    ColoringStats:
      type: object
      properties:
        total:
          type: integer
        byGenre:
          type: array
          items:
            $ref: "#/components/schemas/StatEntry"
        byGender:
          type: array
          items:
            $ref: "#/components/schemas/StatEntry"
      required:
        - total
        - byGenre
        - byGender

    StatEntry:
      type: object
      properties:
        label:
          type: string
        count:
          type: integer
      required:
        - label
        - count

    ChildProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        ageGroup:
          type: string
        avatarEmoji:
          type: string
        totalPages:
          type: integer
        totalMinutes:
          type: integer
        currentDifficulty:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - ageGroup
        - avatarEmoji
        - totalPages
        - totalMinutes
        - currentDifficulty
        - createdAt

    CreateProfileBody:
      type: object
      properties:
        name:
          type: string
        ageGroup:
          type: string
          enum: ["3-5", "6-8", "9+"]
        avatarEmoji:
          type: string
      required:
        - name
        - ageGroup
        - avatarEmoji

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        ageGroup:
          type: string
          enum: ["3-5", "6-8", "9+"]
        avatarEmoji:
          type: string

    GenerateStoryBody:
      type: object
      properties:
        genre:
          type: string
        ageGroup:
          type: string
          enum: ["3-5", "6-8", "9+"]
        gender:
          type: string
          enum: [Boy, Girl, Neutral]
        pageCount:
          type: integer
          minimum: 3
          maximum: 5
        profileId:
          type: ["integer", "null"]
      required:
        - genre
        - ageGroup
        - gender
        - pageCount

    StoryPage:
      type: object
      properties:
        id:
          type: integer
        pageNumber:
          type: integer
        sentence:
          type: string
        imageData:
          type: string
      required:
        - id
        - pageNumber
        - sentence
        - imageData

    StoryResponse:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        theme:
          type: string
        genre:
          type: string
        totalPages:
          type: integer
        pages:
          type: array
          items:
            $ref: "#/components/schemas/StoryPage"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - theme
        - genre
        - totalPages
        - pages
        - createdAt

    DailyChallengeResponse:
      type: object
      properties:
        id:
          type: integer
        challengeDate:
          type: string
        genre:
          type: string
        theme:
          type: string
        imageData:
          type: ["string", "null"]
      required:
        - id
        - challengeDate
        - genre
        - theme

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
